name: 自动审查

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  tests-and-audit:
    name: 测试与依赖审计
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: 安装依赖
        run: npm ci
      - name: 运行测试
        env:
          NCM_CLI_CONFIG_DIR: ${{ runner.temp }}/ncm-cli-config
        run: npm test
      - name: 依赖安全审计
        if: always()
        run: npm audit --omit=dev

  codeql:
    name: CodeQL 分析
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
      - name: 自动构建
        uses: github/codeql-action/autobuild@v4
      - name: 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v4
